<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{padding:0; margin:0;}
        body{
            padding:50px 0;
            background-color:#fff;
            font-size:14px;
            font-family:"Avenir Next";
            color:#555;
            -webkit-font-smoothing:antialiased;
        }
        /*幻灯片区域*/
        .slider,.slider .main ,.slider .main .main-i{
            width:100%; height:400px; position:relative;
        }
        .slider .main{overflow:hidden;}
        .slider .main .main-i img{
            width:100%;position:absolute; left:0; top:50%; z-index:1;
        }
        .slider .main .main-i_right img{margin-right:-50%;}
 
        .slider .main .main-i .caption{
            position:absolute; right:50%; top:30%; z-index:9;
        }
        .slider .main .main-i .caption h2{
            font-size:26px; line-height:50px;color:#b5b5b5; text-align:right;
        }
        .slider .main .main-i .caption h3{
            font-size:40px; line-height:70px;color:#000; text-align:right; ;
        }
        /*控制按钮区域*/
        .slider .ctrl{width:100%; height:13px; line-height:13px; text-align:center; position:absolute; left:0; bottom:-13px; background-color:#fff;}
        .slider .ctrl .ctrl-i{
            display:inline-block; width:12%; height:13px; background-color:#666; position:relative; box-shadow:0 1px 1px rgba(0,0,0,.3); margin-left:1px;
        }
        .slider .ctrl .ctrl-i img{width:100%; position:absolute; left:0; bottom:50px; opacity:0; transition:all .2s;z-index:1;}
        /*hover 的控制按钮的样式*/
        .slider .ctrl .ctrl-i:hover{
            background-color:#f0f0f0;
        }
        .slider .ctrl .ctrl-i:hover img{
            opacity:1;
            bottom:13px;
            z-index:2;
            -webkit-box-reflect:below 0px -webkit-gradient(linear,left top,left bottom, from(transparent),color-stop(50% transparent),to(rgba(255,255,255,0.3)));
        }
        /*active当前展现的样式*/
        .slider .ctrl .ctrl-i_active,
        .slider .ctrl .ctrl-i_active:hover{
            background-color:#000;
        }
        .slider .ctrl .ctrl-i_active:hover img{opacity:0;z-index:10;}
        /*幻灯片切换的样式*/
        .slider .main .main-i{
            opacity:0;
            position:absolute;
            right:50%;
            top:0;
            -webkit-transition:all .5s;
            z-index:2;
        }
        #main_background,
        .slider .main .main-i_active{
            opacity:1;
            right:0;
 
        }
        #main_background{
            z-index:1;
        }
        .slider .main .main-i h2{margin-right:45px;}
        .slider .main .main-i h3{margin-right:-45px;}
        .slider .main .main-i h2 , .slider .main .main-i h3{-webkit-transition:all 1s .8s; opacity:0;}
        .slider .main .main-i_active h2,.slider .main .main-i_active h3{
            margin-right:0; opacity:1;
        }
        .slider .main .main-i .caption{
            margin-right:13%;
        }
    </style>
</head>
<body>
<div class="slider">
    <div class="main" id="template_main">
        <div class="main-i {{css}}" id="main_{{index}}">
        <div class="caption">
            <h2>{{h2}}</h2>
            <h3>{{h3}}</h3>
        </div>
        <img src="imgs/{{index}}.jpg" class="picture"/>
        </div>
    </div>
    <div class="ctrl" id="template_ctrl">
        <a class="ctrl-i " id="ctrl_{{index}}" href="javascript:switchSlider({{index}});">
        <img src="imgs/{{index}}.jpg"/>
        </a>
    </div>
</div>
<script>
    //数据定义，实际生产中应由后台给出
var data = [{img:1,h1:'Beautiful Lacy&Jan',h2:'Cute Girls'},
    {img:2,h1:'Annnanann',h2:'Dadada'},
    {img:3,h1:'Beautiful Ann',h2:'Cute Girl'},
    {img:4,h1:'Beautiful Donna',h2:'Cute Girl'},
    {img:5,h1:'Beautiful Lucy',h2:'Cute Girl'},
    {img:6,h1:'Beautiful Joy',h2:'Cute Girl'},
    {img:7,h1:'Beautiful Ken',h2:'Good boy'}
];
//内容输出
    //0 修改VIEW，转为Template（关键字替换，增加template id）
    //通用函数
    var g = function(id){
        if(id.substr(0,1)=='.'){
            return document.getElementsByClassName(id.substr(1));
        }
        return document.getElementById(id);
    }
//3、添加幻灯片的操作（所有幻灯片对应的按钮）
    function addSliders(){
        //获取模板
        //去掉空格
        var tpl_main = g('template_main').innerHTML
            .replace(/^\s*/,'')
            .replace(/\s*$/,'');
        var tpl_ctrl = g('template_ctrl').innerHTML
            .replace(/^\s*/,'')
            .replace(/\s*$/,'');
        //定义最终输出的HTML变量
        var out_main = [];
        var out_ctrl = [];
        //遍历所有数据，构建最终输出的HTML
        for(i in data){
            var _html_main = tpl_main
                .replace(/{{index}}/g,data[i].img)
                .replace(/{{h2}}/g,data[i].h1)
                .replace(/{{h3}}/g,data[i].h2)
                .replace(/{{css}}/g,['','main-i_right'][i%2]);
            var _html_ctrl = tpl_ctrl
                .replace(/{{index}}/g,data[i].img);
            out_main.push(_html_main);
            out_ctrl.push(_html_ctrl);
 
        }
        //把HTML回写到对应的DOM里面
        g('template_main').innerHTML = out_main.join('');
        g('template_ctrl').innerHTML = out_ctrl.join('');
       //添加切换时的背景图片
        g('template_main').innerHTML +=tpl_main
            .replace(/{{index}}/g,'{{index}}')
            .replace(/{{h2}}/g,data[i].h1)
            .replace(/{{h3}}/g,data[i].h2);
        g('main_{{index}}').id = 'main_background';
 
    }
    //幻灯片切换
    function switchSlider(n){
        //获得要展示的幻灯片按钮 DOM
        var main = g('main_'+n);
        var ctrl = g('ctrl_'+n);
 
        //获得所有幻灯片以及控制按钮
        var clear_main = g('.main-i');
        var clear_ctrl = g('.ctrl-i');
        //清除他们的active样式
        for(var i=0; i<clear_ctrl.length;i++){//这个地方使用的是clear_ctrl.length,我试过使用clear_main.length,然后后面的clear_ctrl[i].className就一直报错，不知道为什么，反正注意就用celar_ctrl.length,不会报错，等我搞懂了，会进行讨论的
            clear_main[i].className=clear_main[i].className
                .replace('main-i_active','');
            clear_ctrl[i].className=clear_ctrl[i].className
                .replace('ctrl-i_active','');
        }
        //为当前控制按钮和幻灯片附加样式
        main.className +=' main-i_active';
        ctrl.className +=' ctrl-i_active';
        //切换时复制上一张幻灯片到main_background中
        setTimeout(()=>{
            g('main_background').innerHTML = main.innerHTML;
        },1000)
 
    }
    function movePictures(){
        var pictures = g('.picture');
        for(var i=0; i<pictures.length;i++){
            pictures[i].style.marginTop = (-1*pictures[i].clientHeight)/2+'px';
        }
    }
window.onload = function(){
    addSliders();
    switchSlider(1);
    setTimeout(function(){
        movePictures();
    },100);
}
 
</script>
</body>
</html>
